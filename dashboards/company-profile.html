<body><header class="navbar dashboard-navbar">

  </div>
</header>
<main class="dashboard-page"><section class="container form-container">
  <div class="dashboard-heading"><h1>Company profile</h1><p>Update how your company appears across TADREEBCOM.</p></div>
  <form class="company-form" id="companyProfileForm">
    <label>Company name<input type="text" value="Aramex"></label>
    <div class="form-grid">
      <label>Website<input type="url" value="https://www.aramex.com"></label>
      <label>Industry<select><option selected>Logistics</option><option>Software Development</option><option>Cyber Security</option><option>Artificial Intelligence</option><option>IT Services</option></select></label>
    </div>
    <label>City<select><option selected>Amman</option><option>Irbid</option></select></label>
    <label>About your company<textarea>Aramex is a leading global logistics and transportation provider founded in Amman in 1982, serving customers across the Middle East and beyond.</textarea></label>
    <button class="primary full" type="submit">Save profile</button>
  </form>
</section></main>
