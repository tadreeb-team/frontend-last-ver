<body><header class="navbar dashboard-navbar">
  <a class="brand" href="../index.html"><span class="logo">▥</span><span>TADREEBCOM</span></a>
  <nav class="nav-links" id="navLinks">
    <a class="" href="company-dashboard.html">Dashboard</a>
    <a class="active" href="company-listings.html">Listings</a>
    <a class="" href="company-profile.html">Company profile</a>
  </nav>
  <div class="nav-actions">
    <button class="icon-btn" id="themeToggle"><span id="themeIcon">☾</span></button>
    <button class="user-avatar">AH</button>
    <button class="menu-btn" id="menuBtn">☰</button>
  </div>
</header>
<main class="dashboard-page"><section class="container form-container">
  <a class="back-link" href="company-dashboard.html">← Back</a>
  <div class="dashboard-heading"><h1>Post a new internship</h1></div>
  <form class="company-form" id="postInternshipForm">
    <label>Title<input type="text" placeholder="e.g. Software Engineering Intern"></label>
    <label>Description<textarea></textarea></label>
    <div class="form-grid">
      <label>Major<select><option>Select major</option><option>Computer Science</option><option>Data Science</option><option>Software Engineering</option><option>Cyber Security</option></select></label>
      <label>City<select><option>Select city</option><option>Amman</option><option>Irbid</option></select></label>
    </div>
    <div class="form-grid">
      <label>Work type<select><option>On-site</option><option>Hybrid</option><option>Remote</option></select></label>
      <label>Duration<input type="text" placeholder="e.g. 3 months"></label>
    </div>
    <button class="primary full" type="submit">Post internship</button>
  </form>
</section></main>
<footer class="footer">
  <div class="container footer-inner">
    <div><a class="brand" href="../index.html"><span class="logo">▥</span><span>TADREEBCOM</span></a><p>The trusted internship platform for Jordan.</p></div>
