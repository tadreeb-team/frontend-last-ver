<main class="dashboard-page profile-page">
  <section class="container profile-container">
    <div class="dashboard-heading">
      <h1>My profile</h1>
      <p>Keep your details up to date.</p>
    </div>

    <form class="profile-form" id="profileForm">
      <label>
        Full name
        <input type="text" value="Laith Haddad">
      </label>

      <label>
        Email
        <input type="email" value="student@ju.edu.jo">
      </label>

      <div class="form-grid">
        <label>
          University
          <select>
            <option selected>University of Jordan</option>
            <option>Yarmouk University</option>
            <option>JUST</option>
            <option>Al-Balqa Applied University</option>
          </select>
        </label>

        <label>
          Major
          <select>
            <option selected>Computer Science</option>
            <option>Artificial Intelligence</option>
            <option>Cyber Security</option>
            <option>Data Science</option>
            <option>Software Engineering</option>
            <option>Computer Information Systems</option>
          </select>
        </label>
      </div>

      <button class="primary full" type="submit">Save changes</button>
    </form>
  </section>
</main>
